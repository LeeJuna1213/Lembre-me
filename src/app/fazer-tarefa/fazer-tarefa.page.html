<ion-content [fullscreen]="true">
   <button class="voltar" (click)="voltar()">
    ↩️
  </button>
   <div class="tarefa-info">
    <div class="emoji">{{ tarefa.emoji }}</div>
    <h2 class="titulo">{{ tarefa.titulo }}</h2>
  </div>

  <ion-card class="card-foto">
    <div class="preview-container" *ngIf="tarefa.foto">
  <img
    [src]="tarefa.foto"
    class="preview-foto"
  />
  </div>
  <button class="bnt-foto" (click)="tirarFoto()">
    📸 Tirar foto para comprovar
  </button>
  </ion-card>

  <ion-card class="concluir">
  <button class="bnt-concluir" 
  (click)="confirmarTarefa()">
    ✅ Concluir tarefa
  </button> 
  </ion-card> 

  <ion-card class="lembrete">
    <button class="bnt-lembrete" (click)="irParaLembrete()">
      ⏱️ {{ tarefa.lembrete ? 'Editar lembrete' : 'Criar lembrete' }}
    </button>
  </ion-card>
  
  <ion-card class="excluir">
    <button
      class="bnt-excluir"
      *ngIf="tarefa.id > 3"
      (click)="excluirTarefa()"
      >
      🗑️ Excluir tarefa
      </button>
  </ion-card>
</ion-content>
